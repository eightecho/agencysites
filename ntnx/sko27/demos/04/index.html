<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutanix SKO FY27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; text-transform: none !important; }

    :root {
      --charcoal: #1F1F20;
      --charcoal-light: #2A2A2B;
      --charcoal-mid: #353536;
      --iris: #7855FA;
      --iris-deep: #4B00AA;
      --iris-light: #9B7FFF;
      --white: #FFFFFF;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --glass-border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--charcoal);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Landing page ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .login-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1F1F20 0%, #2A2A2B 50%, #1F1F20 100%);
    }

    .login-bg::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 85, 250, 0.08) 0%, transparent 70%);
    }

    /* Diagonal line pattern */
    .login-lines {
      position: absolute;
      inset: 0;
      opacity: 0.04;
    }
    .login-lines svg { width: 100%; height: 100%; }

    .login-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 500px;
      padding: 40px 24px;
    }

    .login-lockup { margin-bottom: 32px; }
    .login-lockup img { height: 48px; }

    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 12px;
    }

    .login-date {
      font-size: 0.9rem;
      color: var(--gray-400);
      margin-bottom: 40px;
    }

    .login-actions { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      text-align: center;
      border: none;
      line-height: 1.4;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--iris);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--iris-deep);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(120, 85, 250, 0.35);
    }

    .login-link {
      font-size: 0.85rem;
      color: var(--gray-400);
    }

    .login-link a {
      color: var(--iris-light);
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover { color: var(--white); }

    /* ── Modal ── */
    .login-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-modal-overlay.is-open { display: flex; }

    .login-modal {
      background: var(--charcoal-light);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 40px;
      max-width: 460px;
      width: 100%;
      position: relative;
    }

    .login-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      color: var(--gray-500);
      font-size: 14px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }

    .login-modal-close:hover { color: var(--white); }

    .login-modal .logo-modal { height: 22px; margin-bottom: 24px; }

    .login-modal h2 {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      color: var(--gray-400);
    }

    .login-modal p {
      color: var(--gray-500);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .mt-3 { margin-top: 24px; }

    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--gray-400);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--charcoal);
      border: 1px solid var(--charcoal-mid);
      border-radius: 6px;
      color: var(--white);
      font-size: 0.875rem;
      font-family: inherit;
      transition: border-color 0.15s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--iris);
    }

    .form-group input::placeholder { color: var(--gray-500); }

    .form-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.8rem;
      flex-wrap: wrap;
      gap: 8px;
    }

    .form-links a { color: var(--iris-light); text-decoration: none; }
    .form-links a:hover { color: var(--iris); }
    .form-links .text-muted { color: var(--gray-500); }
    .form-links .text-muted a { color: var(--iris-light); font-weight: 600; }

    .login-modal .btn-primary { width: 100%; padding: 12px; }

    .btn-text-link {
      display: block;
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--gray-500);
      text-decoration: none;
      font-weight: 500;
      text-align: center;
      transition: color 0.15s ease;
    }

    .btn-text-link:hover { color: var(--iris-light); }

    @media (max-width: 540px) {
      .login-title { font-size: 3rem; }
      .form-row { flex-direction: column; gap: 0; }
      .login-modal { padding: 28px; }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-bg"></div>
    <div class="login-lines" aria-hidden="true">
      <svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <g stroke="#7855FA" stroke-width="0.5">
          <line x1="0" y1="0" x2="1440" y2="900"/>
          <line x1="1440" y1="0" x2="0" y2="900"/>
          <line x1="720" y1="0" x2="720" y2="900"/>
          <line x1="0" y1="450" x2="1440" y2="450"/>
        </g>
      </svg>
    </div>

    <div class="login-content">
      <div class="login-lockup">
        <img src="../shared/logos/Nutnaix-skofy27-wht.svg" alt="Nutanix SKO FY27">
      </div>

      <h1 class="login-title">SKO FY27</h1>
      <p class="login-date">Lorem ipsum dolor sit &middot; Consectetur adipiscing</p>

      <div class="login-actions">
        <button class="btn btn-primary" data-open-login>Register Now</button>
        <p class="login-link">Already have an account? <a href="#" data-open-login-form>Log in here</a></p>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="login-modal-overlay" id="loginModal">
    <div class="login-modal">
      <button class="login-modal-close" data-close-login>Close &times;</button>

      <img class="logo-modal" src="../shared/logos/Nutanix-Logo-White-Digital.svg" alt="Nutanix" style="height:22px;">

      <h2>Registration</h2>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt.</p>

      <h2 class="mt-3">Log In</h2>
      <form onsubmit="return false;">
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@company.com">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
          </div>
        </div>
        <div class="form-links">
          <a href="#">Forgot your password?</a>
          <span class="text-muted">Not yet registered? <a href="#">Register here</a>.</span>
        </div>
        <a href="welcome.html" class="btn btn-primary">Log In</a>
        <a href="welcome.html" class="btn-text-link">View site without login</a>
      </form>
    </div>
  </div>

  <script>
    (function(){
      var overlay = document.getElementById('loginModal');
      if (!overlay) return;
      document.querySelectorAll('[data-open-login],[data-open-login-form]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.preventDefault(); overlay.classList.add('is-open'); });
      });
      document.querySelectorAll('[data-close-login]').forEach(function(btn){
        btn.addEventListener('click', function(){ overlay.classList.remove('is-open'); });
      });
      overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.classList.remove('is-open'); });
      document.addEventListener('keydown', function(e){ if(e.key==='Escape') overlay.classList.remove('is-open'); });
    })();
  </script>
  <script src="../shared/site-switcher.js"></script>
</body>
</html>
