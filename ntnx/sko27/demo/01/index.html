<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutanix SKO FY27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <div class="login-page">
    <!-- Nexus 3D Background Pattern -->
    <div class="login-nexus-bg" aria-hidden="true">
      <svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <defs>
          <linearGradient id="nexusGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2A2A2B"/>
            <stop offset="100%" stop-color="#1F1F20"/>
          </linearGradient>
          <linearGradient id="nexusGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3D3D3E" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#2A2A2B" stop-opacity="0.3"/>
          </linearGradient>
        </defs>
        <rect width="1440" height="900" fill="url(#nexusGrad1)"/>
        <!-- Large Nexus X shapes -->
        <g opacity="0.25">
          <!-- Top-left X -->
          <path d="M-100 -50 L200 250 L-100 550 L-400 250 Z" fill="none" stroke="#3D3D3E" stroke-width="1.5"/>
          <path d="M-80 -30 L200 230 L-80 530 L-380 230 Z" fill="url(#nexusGrad2)"/>
          <!-- Center X -->
          <path d="M600 200 L900 500 L600 800 L300 500 Z" fill="none" stroke="#3D3D3E" stroke-width="1.5"/>
          <path d="M620 220 L900 480 L620 780 L320 480 Z" fill="url(#nexusGrad2)"/>
          <!-- Right X -->
          <path d="M1100 -100 L1450 250 L1100 600 L750 250 Z" fill="none" stroke="#3D3D3E" stroke-width="1.5"/>
          <path d="M1120 -80 L1450 230 L1120 580 L770 230 Z" fill="url(#nexusGrad2)"/>
          <!-- Bottom-right X -->
          <path d="M1200 400 L1500 700 L1200 1000 L900 700 Z" fill="none" stroke="#3D3D3E" stroke-width="1"/>
        </g>
        <!-- Subtle grid lines -->
        <g opacity="0.06" stroke="#7855FA" stroke-width="0.5">
          <line x1="0" y1="450" x2="1440" y2="450"/>
          <line x1="720" y1="0" x2="720" y2="900"/>
          <line x1="0" y1="0" x2="1440" y2="900"/>
          <line x1="1440" y1="0" x2="0" y2="900"/>
        </g>
      </svg>
    </div>

    <!-- Content -->
    <div class="login-content">
      <div class="login-lockup">
        <img class="logo" src="../shared/logos/Nutnaix-skofy27-wht.svg" alt="Nutanix SKO FY27" style="height:48px;">
      </div>

      <h1 class="login-title">SKO FY27</h1>
      <p class="login-date">Lorem ipsum dolor sit &middot; Consectetur adipiscing</p>

      <div class="login-actions">
        <button class="btn btn-primary" data-open-login>Register Now</button>
        <p class="login-link">Already have an account? <a href="#" data-open-login-form>Log in here</a></p>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="login-modal-overlay" id="loginModal">
    <div class="login-modal">
      <button class="login-modal-close" data-close-login>Close &times;</button>

      <img class="logo-modal" src="../shared/logos/Nutanix-Logo-White-Digital.svg" alt="Nutanix" style="height:22px;">

      <h2>Registration</h2>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt.</p>

      <h2 class="mt-3">Log In</h2>
      <form onsubmit="return false;">
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@company.com">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
          </div>
        </div>
        <div class="form-links">
          <a href="#">Forgot your password?</a>
          <span class="text-muted">Not yet registered? <a href="#">Register here</a>.</span>
        </div>
        <a href="welcome.html" class="btn btn-primary">Log In</a>
        <a href="welcome.html" class="btn-text-link">View site without login</a>
      </form>
    </div>
  </div>

  <script src="assets/main.js"></script>
  <script src="../shared/site-switcher.js"></script>
</body>
</html>
