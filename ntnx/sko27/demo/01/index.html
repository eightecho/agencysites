<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutanix SKO FY27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; text-transform: none !important; }

    :root {
      --charcoal: #1F1F20;
      --charcoal-light: #2A2A2B;
      --iris: #7855FA;
      --iris-deep: #4B00AA;
      --iris-light: #9B7FFF;
      --white: #FFFFFF;
      --off-white: #f5f6f7;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --text-dark: #1F2937;
    }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--off-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── Landing page ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #eaeaea 0%, #f2f2f3 25%, #e8e8e9 50%, #f0f0f1 75%, #eaeaea 100%);
    }

    /* Left accent bar — removed */

    /* Static light streaks */
    .hero-streaks {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .hero-streaks .streak {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), rgba(0,0,0,0.03), transparent);
    }
    .hero-streaks .streak:nth-child(1) { top: 18%; left: 5%; width: 55%; }
    .hero-streaks .streak:nth-child(2) { top: 33%; left: 20%; width: 40%; height: 2px; }
    .hero-streaks .streak:nth-child(3) { top: 52%; left: 10%; width: 65%; }
    .hero-streaks .streak:nth-child(4) { top: 68%; left: 30%; width: 35%; }
    .hero-streaks .streak:nth-child(5) { top: 43%; left: 15%; width: 50%; height: 2px; }
    .hero-streaks .streak:nth-child(6) { top: 78%; left: 40%; width: 30%; }
    .hero-streaks .streak:nth-child(7) { top: 13%; left: 25%; width: 45%; }
    .hero-streaks .streak:nth-child(8) { top: 58%; left: 8%; width: 60%; height: 2px; }

    /* Static diagonal streaks */
    .hero-diagonals {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .hero-diagonals .diagonal {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.05), rgba(0,0,0,0.025), transparent);
      transform: rotate(-30deg);
    }
    .hero-diagonals .diagonal:nth-child(1) { top: 15%; left: 30%; width: 45%; }
    .hero-diagonals .diagonal:nth-child(2) { top: 35%; left: 45%; width: 35%; height: 2px; }
    .hero-diagonals .diagonal:nth-child(3) { top: 55%; left: 25%; width: 55%; }
    .hero-diagonals .diagonal:nth-child(4) { top: 70%; left: 50%; width: 30%; }
    .hero-diagonals .diagonal:nth-child(5) { top: 25%; left: 55%; width: 40%; height: 2px; }
    .hero-diagonals .diagonal:nth-child(6) { top: 80%; left: 35%; width: 25%; }

    /* Static glow */
    .hero-glow {
      position: absolute;
      top: 50%;
      left: 35%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0.01) 40%, transparent 70%);
      pointer-events: none;
    }

    .login-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 500px;
      padding: 40px 24px;
    }

    .login-lockup { margin-bottom: 40px; }
    .login-lockup img { height: 64px; }

    .login-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 12px;
      color: var(--charcoal);
    }

    .login-date {
      font-size: 0.9rem;
      color: var(--gray-500);
      margin-bottom: 40px;
    }

    .login-actions { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      text-align: center;
      border: none;
      line-height: 1.4;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--iris);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--iris-deep);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(120, 85, 250, 0.35);
    }

    .login-link {
      font-size: 0.85rem;
      color: var(--gray-500);
    }

    .login-link a {
      color: var(--iris);
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover { color: var(--iris-deep); }

    @media (max-width: 540px) {
      .login-title { font-size: 3rem; }
    }
  </style>
</head>
