<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutanix SKO FY27 — Design Directions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --charcoal: #1F1F20;
      --charcoal-light: #2A2A2B;
      --iris: #7855FA;
      --iris-light: #9B7FFF;
      --white: #FFFFFF;
      --gray-400: #9CA3AF;
      --gray-600: #4B5563;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--charcoal);
      color: var(--white);
      min-height: 100vh;
    }

    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 32px;
    }

    .dashboard-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .dashboard-header img {
      height: 44px;
      margin-bottom: 24px;
    }

    .dashboard-header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--gray-400);
      letter-spacing: 0.04em;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--charcoal-light);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-preview {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--charcoal);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-preview iframe {
      width: 1280px;
      height: 1280px;
      border: none;
      pointer-events: none;
      position: absolute;
      top: 50%;
      left: 50%;
    }

    /* Link rows under the preview */
    .card-links {
      display: flex;
      flex-direction: column;
    }

    .card-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      text-decoration: none;
      color: var(--gray-400);
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.15s ease, background 0.15s ease;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .card-link:first-child {
      border-top: none;
    }

    .card-link:hover {
      color: var(--white);
      background: rgba(120, 85, 250, 0.08);
    }

    .card-link .link-type {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--iris-light);
      background: rgba(120, 85, 250, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      min-width: 52px;
      text-align: center;
    }

    .card-link .link-label {
      flex: 1;
    }

    .card-link svg {
      width: 14px;
      height: 14px;
      opacity: 0.4;
      flex-shrink: 0;
      transition: opacity 0.15s ease;
    }

    .card-link:hover svg {
      opacity: 1;
    }

    .dashboard-footer {
      text-align: center;
      margin-top: 80px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .dashboard-footer img {
      height: 45px;
      margin-bottom: 12px;
    }

    .dashboard-footer p {
      font-size: 0.75rem;
      color: var(--gray-600);
    }

    @media (max-width: 740px) {
      .cards { grid-template-columns: 1fr; }
      .dashboard { padding: 40px 20px; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="dashboard-header">
      <img src="shared/logos/Nutnaix-skofy27-wht.svg" alt="Nutanix SKO FY27">

    </div>

      <!-- Design 01 -->
      <div class="card">

        <div class="card-links">
          <a class="card-link" href="01/index.html">
            <span class="link-type">Website</span>
            <span class="link-label">View Site</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </a>
          <a class="card-link" href="01/emails/savedate.html">
            <span class="link-type">Email</span>

          </a>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </a>

      </div>

      <!-- Design 02 -->
      <div class="card">
        <div class="card-preview">
          <iframe src="02/index.html" loading="lazy" tabindex="-1"></iframe>
        </div>
        <div class="card-links">
          <a class="card-link" href="02/index.html">
            <span class="link-type">Website</span>
            <span class="link-label">View Site</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </a>
          <a class="card-link" href="02/emails/savedate.html">
            <span class="link-type">Email</span>
            <span class="link-label">Save the Date</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </a>
          <a class="card-link" href="02/emails/regopen.html">
            <span class="link-type">Email</span>
            <span class="link-label">Registration Open</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>

      <!-- Design 03 -->
      <div class="card">
        <div class="card-preview">
          <iframe src="03/index.html" loading="lazy" tabindex="-1"></iframe>
        </div>
        <div class="card-links">
          <a class="card-link" href="03/index.html">
            <span class="link-type">Website</span>
            <span class="link-label">View Site</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </a>
          <a class="card-link" href="03/emails/savedate.html">
            <span class="link-type">Email</span>
            <span class="link-label">Save the Date</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </a>
          <a class="card-link" href="03/emails/regopen.html">
            <span class="link-type">Email</span>
            <span class="link-label">Registration Open</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>

    </div>

    <div class="dashboard-footer">
      <img src="shared/logos/8echo-logo-horiz-wht.svg" alt="Eight Echo Agency">
      <p>&copy; Eight Echo Agency LLC</p>
    </div>
  </div>

  <script>
    // Scale iframes to fit square preview after load
    document.querySelectorAll('.card-preview').forEach(function(preview) {
      var iframe = preview.querySelector('iframe');
      function scaleIframe() {
        var previewWidth = preview.offsetWidth;
        var scale = previewWidth / 1280;
        iframe.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
      }
      iframe.addEventListener('load', scaleIframe);
      window.addEventListener('resize', scaleIframe);
      scaleIframe();
    });
  </script>
</body>
</html>
