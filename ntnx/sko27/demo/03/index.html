<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutanix SKO FY27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; text-transform: none !important; }

    :root {
      --charcoal: #1F1F20;
      --charcoal-light: #2A2A2B;
      --charcoal-mid: #353536;
      --iris: #7855FA;
      --iris-deep: #4B00AA;
      --iris-light: #9B7FFF;
      --white: #FFFFFF;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --glass-border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--charcoal);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Landing page ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .login-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1F1F20 0%, #2A2A2B 50%, #1F1F20 100%);
    }

    .login-bg::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 85, 250, 0.08) 0%, transparent 70%);
    }

    /* Diagonal line pattern */
    .login-lines {
      position: absolute;
      inset: 0;
      opacity: 0.04;
    }
    .login-lines svg { width: 100%; height: 100%; }

    .login-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 500px;
      padding: 40px 24px;
    }

    .login-lockup { margin-bottom: 32px; }
    .login-lockup img { height: 48px; }

    .login-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 12px;
    }

    .login-date {
      font-size: 0.9rem;
      color: var(--gray-400);
      margin-bottom: 40px;
    }

    .login-actions { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      text-align: center;
      border: none;
      line-height: 1.4;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--iris);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--iris-deep);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(120, 85, 250, 0.35);
    }

    .login-link {
      font-size: 0.85rem;
      color: var(--gray-400);
    }

    .login-link a {
      color: var(--iris-light);
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover { color: var(--white); }

    /* Horizontal scan lines on login page */
    .login-page::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(120, 85, 250, 0.09) 3px,
        rgba(120, 85, 250, 0.09) 4px
      );
    }

    @media (max-width: 540px) {
      .login-title { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-bg"></div>
    <div class="login-lines" aria-hidden="true">
      <svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <g stroke="#7855FA" stroke-width="0.5">
          <line x1="0" y1="0" x2="1440" y2="900"/>
          <line x1="1440" y1="0" x2="0" y2="900"/>
          <line x1="720" y1="0" x2="720" y2="900"/>
          <line x1="0" y1="450" x2="1440" y2="450"/>
        </g>
      </svg>
    </div>

    <div class="login-content">
      <div class="login-lockup">
        <img src="../shared/logos/Nutnaix-skofy27-wht.svg" alt="Nutanix SKO FY27">
      </div>

      <h1 class="login-title">SKO FY27</h1>
      <p class="login-date">Lorem ipsum dolor sit &middot; Consectetur adipiscing</p>

      <div class="login-actions">
        <a href="register.html" class="btn btn-primary">Register Now</a>
        <p class="login-link">Already have an account? <a href="login.html">Log in here</a></p>
      </div>
    </div>
  </div>

  <script src="../shared/site-switcher.js"></script>
</body>
</html>
