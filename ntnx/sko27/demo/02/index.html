<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutanix SKO FY27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    /* ===== Global Style Guide Overrides ===== */
    :root {
      --font-display: 'Montserrat', sans-serif;
      --font-body: 'Montserrat', sans-serif;
    }
    * {
      text-transform: none !important;
      font-family: 'Montserrat', sans-serif !important;
    }
    h1, h2, h3, h4 {
      font-family: 'Montserrat', sans-serif !important;
      text-transform: none !important;
    }
    h1 { font-weight: 800; letter-spacing: 0.02em; }
    h2 { font-weight: 700; letter-spacing: 0.01em; }
    h3 { font-weight: 600; }
    h4 { font-weight: 600; }
    .login-nexus-art { opacity: 0.3; }
  </style>
</head>
<body>

  <div class="login-page">
    <!-- Gradient background with Nexus art -->
    <div class="login-left" style="flex:1;position:absolute;inset:0;">
      <div class="login-nexus-art" aria-hidden="true">
        <svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="nxLine" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
            </linearGradient>
          </defs>
          <g fill="none" stroke="url(#nxLine)" stroke-width="1.5">
            <path d="M100 50 L400 350 L100 650 L-200 350 Z"/>
            <path d="M500 200 L750 450 L500 700 L250 450 Z"/>
            <path d="M300 -100 L600 200 L300 500 L0 200 Z"/>
            <path d="M600 500 L850 750 L600 1000 L350 750 Z"/>
          </g>
          <g opacity="0.14" stroke="#FFFFFF" stroke-width="0.5">
            <line x1="0" y1="0" x2="800" y2="900"/>
            <line x1="800" y1="0" x2="0" y2="900"/>
            <line x1="400" y1="0" x2="400" y2="900"/>
            <line x1="0" y1="450" x2="800" y2="450"/>
          </g>
        </svg>
      </div>
    </div>

    <!-- Centered content -->
    <div class="login-content">
      <div class="login-lockup">
        <img src="../shared/logos/ntnx-sko17-logo-stacked-wht@3x.png" alt="Nutanix Sales Kickoff">
      </div>

      <p class="login-date">Lorem ipsum dolor sit &middot; Consectetur adipiscing</p>

      <div class="login-actions">
        <a href="register.html" class="btn btn-primary">Register Now</a>
        <p class="login-link">Already have an account? <a href="login.html">Log in here</a></p>
      </div>
    </div>
  </div>

  <script src="../shared/site-switcher.js"></script>
</body>
</html>
