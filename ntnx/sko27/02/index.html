<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutanix SKO FY27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <div class="login-page">
    <!-- Gradient background with Nexus art -->
    <div class="login-left" style="flex:1;position:absolute;inset:0;">
      <div class="login-nexus-art" aria-hidden="true">
        <svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="nxLine" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.03"/>
            </linearGradient>
          </defs>
          <g fill="none" stroke="url(#nxLine)" stroke-width="1.5">
            <path d="M100 50 L400 350 L100 650 L-200 350 Z"/>
            <path d="M500 200 L750 450 L500 700 L250 450 Z"/>
            <path d="M300 -100 L600 200 L300 500 L0 200 Z"/>
            <path d="M600 500 L850 750 L600 1000 L350 750 Z"/>
          </g>
          <g opacity="0.05" stroke="#FFFFFF" stroke-width="0.5">
            <line x1="0" y1="0" x2="800" y2="900"/>
            <line x1="800" y1="0" x2="0" y2="900"/>
            <line x1="400" y1="0" x2="400" y2="900"/>
            <line x1="0" y1="450" x2="800" y2="450"/>
          </g>
        </svg>
      </div>
    </div>

    <!-- Centered content -->
    <div class="login-content">
      <div class="login-lockup">
        <img src="../shared/logos/Nutnaix-skofy27-wht.svg" alt="Nutanix SKO FY27" style="height:48px;">
      </div>

      <h1 class="login-title">SKO FY27</h1>
      <p class="login-date">Lorem ipsum dolor sit &middot; Consectetur adipiscing</p>

      <div class="login-actions">
        <button class="btn btn-primary" data-open-login>Register Now</button>
        <p class="login-link">Already have an account? <a href="#" data-open-login-form>Log in here</a></p>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div class="login-modal-overlay" id="loginModal">
    <div class="login-modal">
      <button class="login-modal-close" data-close-login>Close &times;</button>

      <img class="logo-modal" src="../shared/logos/Nutanix-Logo-White-Digital.svg" alt="Nutanix" style="height:22px;">

      <h2>Registration</h2>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt.</p>

      <h2 class="mt-3">Log In</h2>
      <form onsubmit="return false;">
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@company.com">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
          </div>
        </div>
        <div class="form-links">
          <a href="#">Forgot your password?</a>
          <span class="text-muted">Not yet registered? <a href="#">Register here</a>.</span>
        </div>
        <a href="welcome.html" class="btn btn-primary">Log In</a>
        <a href="welcome.html" class="btn-text-link">View site without login</a>
      </form>
    </div>
  </div>

  <script src="assets/main.js"></script>
  <script src="../shared/site-switcher.js"></script>
</body>
</html>
